name: Build Kernel for Moto G82

on:
  workflow_dispatch:

jobs:
  build:
    name: Build Kernel
    runs-on: ubuntu-22.04
    steps:
    - name: Checkout kernel source
      uses: actions/checkout@v4
      with:
        path: kernel/source

    - name: Build Kernel
      uses: dabao1955/kernel_build_action@main
      with:
        kernel-url: ./kernel/source/
        kernel-dir: ./kernel/source/
        config: rhodep_defconfig
        arch: arm64
        aosp-clang: true
        android-version: 13
        anykernel3: true
        release: true
        access-token: ${{ secrets.GITHUB_TOKEN }}
